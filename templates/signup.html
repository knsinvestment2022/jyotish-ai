<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Jyotish AI</title>
  <style>
    :root { --accent: #1F4E79; --gold: #C9A84C; --bg: #F7F8FA; --text: #1a1a1a; --muted: #595959; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; font-size: 24px; font-weight: 800; color: var(--accent);
            margin-bottom: 28px; }
    .logo span { color: var(--gold); }
    .card { background: white; border-radius: 14px; padding: 36px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .beta { background: #dcfce7; color: #166534; padding: 8px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text);
            margin-bottom: 4px; margin-top: 16px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #D8DCE2;
            border-radius: 8px; font-size: 15px; outline: none; }
    input:focus { border-color: var(--accent); }
    .error { background: #FDEDEE; color: #B3261E; padding: 10px 14px;
             border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .btn { width: 100%; background: var(--accent); color: white; border: none;
           padding: 13px; border-radius: 8px; font-size: 16px; font-weight: 700;
           cursor: pointer; margin-top: 20px; }
    .btn:hover { opacity: 0.9; }
    .footer-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); }
    .footer-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">Jyotish <span>AI</span></div>
  <div class="card">
    <h1>Create your account</h1>
    <p class="subtitle">Join and start asking astrology questions instantly.</p>
    <div class="beta">🎉 Beta access — first 100 users get 90 days free, unlimited readings</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup">
      <label>Your name</label>
      <input type="text" name="name" placeholder="Arjun Sharma" required autofocus>
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@email.com" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Minimum 6 characters" required>
      <button type="submit" class="btn">Create Account →</button>
    </form>
    <div class="footer-link">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
</body>
</html>

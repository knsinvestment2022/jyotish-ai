<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Jyotish AI</title>
  <style>
    :root { --accent: #1F4E79; --gold: #C9A84C; --bg: #F7F8FA; --text: #1a1a1a; --muted: #595959; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 28px; }
    .logo span { color: var(--gold); }
    .card { background: white; border-radius: 14px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; margin-top: 16px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #D8DCE2; border-radius: 8px; font-size: 15px; outline: none; }
    input:focus { border-color: var(--accent); }
    .error { background: #FDEDEE; color: #B3261E; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .btn { width: 100%; background: var(--accent); color: white; border: none;
           padding: 13px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    .btn:hover { opacity: 0.9; }
    .footer-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); }
    .footer-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">Jyotish <span>AI</span></div>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue your readings.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="error" style="background:#f0fdf4;color:#166534;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@email.com" required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div class="footer-link">No account yet? <a href="/signup">Sign up free</a></div>
  </div>
</div>
</body>
</html>
